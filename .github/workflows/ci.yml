name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build examples
        run: go build ./examples/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  tests:
    name: Tests
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create WMI test user
        shell: powershell
        run: |
          net user wmitest "P@ssw0rd!23" /add /Y
          net localgroup Administrators wmitest /add

      - name: Ensure WMI service is running
        shell: powershell
        run: |
          Set-Service -Name Winmgmt -StartupType Automatic
          Start-Service -Name Winmgmt
          Get-WmiObject Win32_OperatingSystem | Select-Object -Property Caption

      - name: Run tests
        shell: cmd
        env:
          WMI_HOST: localhost
          WMI_USER: wmitest
          WMI_PASS: "P@ssw0rd!23"
        run: go test -race -tags e2e_ntlm -v -count=1 -timeout 120s
