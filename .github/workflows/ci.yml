name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build examples
        run: go build ./examples/...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test-ntlm:
    name: Test NTLM
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create WMI test user
        shell: powershell
        run: |
          net user wmitest "P@ssw0rd!23" /add /Y
          net localgroup Administrators wmitest /add
          Set-Service -Name Winmgmt -StartupType Automatic
          Start-Service -Name Winmgmt

      - name: Run tests
        shell: pwsh
        env:
          WMI_HOST: localhost
          WMI_USER: wmitest
          WMI_PASS: "P@ssw0rd!23"
        run: go test -race -tags "e2e ntlm" -v -count=1 -timeout 120s ./...

  test-kerberos:
    name: Test Kerberos
    runs-on: windows-2022
    timeout-minutes: 15
    env:
      KRB5_REALM: WMI.TEST
      KRB5_USER: wmitest
      KRB5_PASS: "P@ssw0rd!23"
      WMI_KRB_HOST: localhost.wmi.test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create WMI test user
        shell: pwsh
        run: |
          net user $env:KRB5_USER $env:KRB5_PASS /add /Y
          net localgroup Administrators $env:KRB5_USER /add
          Set-Service -Name Winmgmt -StartupType Automatic
          Start-Service -Name Winmgmt

      - name: Install MIT Kerberos for Windows
        shell: pwsh
        run: |
          $url = "https://web.mit.edu/kerberos/dist/kfw/4.1/kfw-4.1-amd64.msi"
          $msi = "$env:RUNNER_TEMP\kfw.msi"
          Invoke-WebRequest -Uri $url -OutFile $msi -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /qn /norestart" -Wait
          $kbin = "C:\Program Files\MIT\Kerberos\bin"
          if (-not (Test-Path $kbin)) { throw "MIT Kerberos install failed" }
          Add-Content -Path $env:GITHUB_PATH -Value $kbin

      - name: Configure Kerberos realm
        shell: pwsh
        run: |
          $cfgDir = "C:\ProgramData\MIT\Kerberos5"
          $varDir = "$cfgDir\var\krb5kdc"
          New-Item -ItemType Directory -Force -Path $varDir | Out-Null

          $hostsPath = "C:\Windows\System32\drivers\etc\hosts"
          $hostEntry = "127.0.0.1 $env:WMI_KRB_HOST"
          if (-not (Select-String -Path $hostsPath -Pattern ([regex]::Escape($env:WMI_KRB_HOST)) -Quiet)) {
            Add-Content -Path $hostsPath -Value $hostEntry
          }

          @"
          [libdefaults]
            default_realm = $env:KRB5_REALM
            dns_lookup_kdc = false
            dns_lookup_realm = false
            udp_preference_limit = 1

          [realms]
            $($env:KRB5_REALM) = {
              kdc = 127.0.0.1:88
              admin_server = 127.0.0.1:749
              database_name = $varDir\principal
              key_stash_file = $varDir\.k5.$($env:KRB5_REALM)
              acl_file = $varDir\kadm5.acl
            }

          [domain_realm]
            .wmi.test = $env:KRB5_REALM
            wmi.test  = $env:KRB5_REALM
          "@ | Set-Content -Path "$cfgDir\krb5.ini" -Encoding ASCII

          @"
          [kdcdefaults]
            kdc_ports = 88

          [realms]
            $($env:KRB5_REALM) = {
              database_name = $varDir\principal
              key_stash_file = $varDir\.k5.$($env:KRB5_REALM)
              acl_file = $varDir\kadm5.acl
              max_life = 12h 0m 0s
              max_renewable_life = 7d 0h 0m 0s
            }
          "@ | Set-Content -Path "$varDir\kdc.conf" -Encoding ASCII

          "*/admin@$($env:KRB5_REALM) *" | Set-Content -Path "$varDir\kadm5.acl" -Encoding ASCII

      - name: Initialize KDC database and principals
        shell: pwsh
        run: |
          $env:KRB5_CONFIG = "C:\ProgramData\MIT\Kerberos5\krb5.ini"
          $env:KRB5_KDC_PROFILE = "C:\ProgramData\MIT\Kerberos5\var\krb5kdc\kdc.conf"
          $kbin = "C:\Program Files\MIT\Kerberos\bin"
          $servicePrincipal = "host/$env:WMI_KRB_HOST@$env:KRB5_REALM"

          & "$kbin\kdb5_util.exe" create -s -P "stash-master-pw" -r $env:KRB5_REALM
          if ($LASTEXITCODE -ne 0) { throw "kdb5_util create failed" }

          & "$kbin\kadmin.local.exe" -q "addprinc -pw $env:KRB5_PASS $env:KRB5_USER@$env:KRB5_REALM"
          if ($LASTEXITCODE -ne 0) { throw "failed to create user principal" }

          & "$kbin\kadmin.local.exe" -q "addprinc -randkey $servicePrincipal"
          if ($LASTEXITCODE -ne 0) { throw "failed to create service principal" }

          & "$kbin\kadmin.local.exe" -q "ktadd -k C:\ProgramData\MIT\Kerberos5\host.keytab $servicePrincipal"
          if ($LASTEXITCODE -ne 0) { throw "failed to write service keytab" }

      - name: Start KDC
        shell: pwsh
        run: |
          $env:KRB5_CONFIG = "C:\ProgramData\MIT\Kerberos5\krb5.ini"
          $env:KRB5_KDC_PROFILE = "C:\ProgramData\MIT\Kerberos5\var\krb5kdc\kdc.conf"
          $kbin = "C:\Program Files\MIT\Kerberos\bin"

          Start-Process -FilePath "$kbin\krb5kdc.exe" -WindowStyle Hidden

          $ok = $false
          for ($i = 0; $i -lt 20; $i++) {
            if (Test-NetConnection -ComputerName 127.0.0.1 -Port 88 -InformationLevel Quiet) {
              $ok = $true
              break
            }
            Start-Sleep -Seconds 1
          }
          if (-not $ok) { throw "KDC did not come up on port 88" }

      - name: Smoke test Kerberos client config
        shell: pwsh
        run: |
          $env:KRB5_CONFIG = "C:\ProgramData\MIT\Kerberos5\krb5.ini"
          $kbin = "C:\Program Files\MIT\Kerberos\bin"
          "$env:KRB5_PASS" | & "$kbin\kinit.exe" "$env:KRB5_USER@$env:KRB5_REALM"
          if ($LASTEXITCODE -ne 0) { throw "kinit failed" }
          & "$kbin\klist.exe"

      - name: Export test environment
        shell: pwsh
        run: |
          @(
            "KRB5_CONFIG=C:\ProgramData\MIT\Kerberos5\krb5.ini",
            "WMI_HOST=localhost",
            "WMI_USER=$env:KRB5_USER",
            "WMI_PASS=$env:KRB5_PASS",
            "WMI_REALM=$env:KRB5_REALM",
            "WMI_KDC_HOST=127.0.0.1",
            "WMI_KDC_PORT=88",
            "WMI_KRB_HOST=$env:WMI_KRB_HOST",
            "WMI_KEYTAB=C:\ProgramData\MIT\Kerberos5\host.keytab"
          ) | Add-Content -Path $env:GITHUB_ENV

      - name: Run tests
        shell: pwsh
        run: go test -race -tags "e2e kerberos" -v -count=1 -timeout 120s ./...
