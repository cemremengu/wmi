name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build examples
        run: go build ./examples/...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test-ntlm:
    name: Test NTLM
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Create WMI test user
        shell: powershell
        run: |
          net user wmitest "P@ssw0rd!23" /add /Y
          net localgroup Administrators wmitest /add
          Set-Service -Name Winmgmt -StartupType Automatic
          Start-Service -Name Winmgmt

      - name: Run tests
        shell: pwsh
        env:
          WMI_HOST: localhost
          WMI_USER: wmitest
          WMI_PASS: "P@ssw0rd!23"
        run: go test -race -tags e2e -v -count=1 -timeout 120s ./...

  test-kerberos:
      name: Test Kerberos
      runs-on: ubuntu-latest
      timeout-minutes: 10
      services:
        kdc:
          image: gcavalcante8808/krb5-server
          ports:
            - 88:88
            - 88:88/udp
            - 464:464
            - 749:749
          env:
            KRB5_REALM: WMI.TEST
            KRB5_KDC: localhost
            KRB5_PASS: "P@ssw0rd!23"
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-go@v6
          with:
            go-version-file: go.mod
  
        - name: Install krb5 client tools
          run: |
            sudo apt-get update
            sudo apt-get install -y krb5-user
  
        - name: Write krb5.conf
          run: |
            sudo tee /etc/krb5.conf > /dev/null <<'EOF'
            [libdefaults]
              default_realm = WMI.TEST
              dns_lookup_kdc = false
              dns_lookup_realm = false
              udp_preference_limit = 1
  
            [realms]
              WMI.TEST = {
                kdc = 127.0.0.1:88
                admin_server = 127.0.0.1:749
              }
  
            [domain_realm]
              .wmi.test = WMI.TEST
              wmi.test  = WMI.TEST
            EOF
  
        - name: Add test principal
          run: |
            # The container creates admin/admin@REALM with KRB5_PASS by default.
            # Use kadmin (network) from the host against the container.
            echo "P@ssw0rd!23" | kadmin -p admin/admin -r WMI.TEST \
              -q "addprinc -pw P@ssw0rd!23 wmitest@WMI.TEST"
  
        - name: Smoke test
          run: |
            echo "P@ssw0rd!23" | kinit wmitest@WMI.TEST
            klist
  
        - name: Run tests
          env:
            WMI_REALM: WMI.TEST
            WMI_USER: wmitest
            WMI_PASS: "P@ssw0rd!23"
            WMI_KDC_HOST: 127.0.0.1
            WMI_KDC_PORT: "88"
            KRB5_CONFIG: /etc/krb5.conf
          run: go test -race -tags e2e -v -count=1 -timeout 120s ./...
  
        - name: KDC logs on failure
          if: failure()
          run: docker logs "${{ job.services.kdc.id }}"
